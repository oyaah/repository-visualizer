services:
  backend:
    build:
      context: .
      target: backend
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - .:/workspace/repository-visualizer:ro

  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE: http://127.0.0.1:8000
    depends_on:
      - backend
